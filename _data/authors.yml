# Co-author profiles
# -----------------------------------------------------------------------------
# If a page/post sets `author: <key>` in its front matter, the entry here keyed
# by the same `<key>` overrides `site.author` in the sidebar.
# (See _includes/author-profile.html)
#
# Example:
#   jane-doe:
#     name: Jane Doe
#     web: https://janedoe.example
#     code: https://github.com/jane-doe
#     email: jane@example.com
