<!-- click-to-copy for elements with [data-copy] -->
<script>
(function () {
  document.addEventListener('click', function (e) {
    var el = e.target.closest ? e.target.closest('[data-copy]') : null;
    if (!el) return;
    e.preventDefault();
    var text = el.getAttribute('data-copy');
    var hint = el.querySelector('.copy-hint');
    var prev = hint ? hint.textContent : '';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, done);
    } else { done(); }
    function done() {
      el.classList.add('copied');
      if (hint) hint.textContent = '已复制 ✓';
      setTimeout(function () {
        el.classList.remove('copied');
        if (hint) hint.textContent = prev;
      }, 1600);
    }
  });
})();
</script>
