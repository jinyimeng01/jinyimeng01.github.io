<!-- click-to-copy for elements with [data-copy] -->
<script>
(function () {
  document.addEventListener('click', function (e) {
    var el = e.target.closest ? e.target.closest('[data-copy]') : null;
    if (!el) return;
    e.preventDefault();
    var text = el.getAttribute('data-copy');
    var hint = el.querySelector('.copy-hint');
    var prev = hint ? hint.textContent : '';
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(done, done);
    } else { done(); }
    function done() {
      el.classList.add('copied');
      if (hint) hint.textContent = 'Copied ✓';
      setTimeout(function () {
        el.classList.remove('copied');
        if (hint) hint.textContent = prev;
      }, 1600);
    }
  });
})();
</script>

<!-- gradient theme switcher (3 metallic palettes, persisted) -->
<script>
(function () {
  var themes = ['aurora', 'haitang', 'onyx'];
  var saved = 'aurora';
  try { saved = localStorage.getItem('grad-theme') || 'aurora'; } catch (e) {}
  function apply(t) {
    if (!document.body) return;
    themes.forEach(function (x) { document.body.classList.remove('theme-' + x); });
    if (t !== 'aurora') document.body.classList.add('theme-' + t);
    var btns = document.querySelectorAll('.grad-switcher button');
    for (var i = 0; i < btns.length; i++) btns[i].classList.toggle('active', btns[i].getAttribute('data-theme') === t);
  }
  function build() {
    var wrap = document.createElement('div');
    wrap.className = 'grad-switcher';
    wrap.setAttribute('aria-label', 'Accent theme');
    themes.forEach(function (t) {
      var b = document.createElement('button');
      b.type = 'button';
      b.setAttribute('data-theme', t);
      b.title = t.charAt(0).toUpperCase() + t.slice(1);
      b.onclick = function () { try { localStorage.setItem('grad-theme', t); } catch (e) {} apply(t); };
      wrap.appendChild(b);
    });
    document.body.appendChild(wrap);
    apply(saved);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', build);
  else build();
})();
</script>
